<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hush</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:       #FAF5EF;
      --parchment:   #F3EBE0;
      --blush:       #F9C49A;
      --blush-light: #FCDFC4;
      --muted:       rgba(215, 120, 40, 0.25);
      --wine:        #D96B10;
      --wine-light:  #F08030;
      --wine-pale:   rgba(215, 120, 40, 0.15);
      --text:        #221206;
      --text-muted:  #8C5828;
      --link-hover:  #D96070;
    }

    body {
      background: var(--cream);
      color: var(--text);
      font-family: 'Georgia', serif;
      min-height: 100vh;
    }

    /* ── NAV ─────────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--cream);
      border-bottom: 1px solid var(--blush);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 52px;
    }

    .wordmark {
      font-size: 1.25rem;
      font-style: italic;
      color: var(--wine);
      letter-spacing: 0.04em;
      user-select: none;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--blush);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: var(--wine);
      font-style: normal;
      font-family: system-ui;
      cursor: pointer;
    }

    /* ── SEARCH ──────────────────────────────── */
    .nav-search {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
      max-width: 240px;
    }

    .search-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      color: var(--text-muted);
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .search-btn:hover { color: var(--wine); }
    .search-btn svg { width: 15px; height: 15px; fill: currentColor; }

    .search-input {
      width: 0;
      max-width: 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid transparent;
      padding: 0.25rem 0;
      font-family: system-ui;
      font-size: 0.82rem;
      color: var(--text);
      outline: none;
      transition: width 0.25s ease, max-width 0.25s ease, border-color 0.25s ease;
      overflow: hidden;
    }

    .nav-search.open .search-input {
      width: 160px;
      max-width: 160px;
      border-bottom-color: var(--blush);
    }

    .nav-search.open .search-input:focus { border-bottom-color: var(--wine-light); }
    .search-input::placeholder { color: var(--muted); }

    .search-results {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: 220px;
      background: var(--cream);
      border: 1px solid var(--blush-light);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(44,26,18,0.08);
      display: none;
      z-index: 50;
    }

    .search-results.open { display: block; }

    .search-result {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.65rem 1rem;
      cursor: pointer;
      transition: background 0.1s;
      text-decoration: none;
    }

    .search-result:hover { background: var(--parchment); }

    .search-result-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--blush);
      flex-shrink: 0;
    }

    .search-result-avatar.wine  { background: var(--wine-pale); }
    .search-result-avatar.blush { background: var(--blush); }
    .search-result-avatar.cream { background: var(--parchment); }

    .search-result-handle {
      font-size: 0.8rem;
      font-family: system-ui;
      font-weight: 600;
      color: var(--text);
    }

    .search-no-results {
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-family: system-ui;
      color: var(--text-muted);
    }

    /* ── SORT TOGGLE ─────────────────────────── */
    .sort-bar {
      max-width: 560px;
      margin: 1.5rem auto 0;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .sort-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      font-family: system-ui;
    }

    .toggle-group {
      display: flex;
      background: var(--parchment);
      border-radius: 20px;
      padding: 3px;
      gap: 2px;
    }

    .toggle-btn {
      padding: 4px 14px;
      border: none;
      border-radius: 16px;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-family: system-ui;
      cursor: pointer;
      transition: all 0.2s;
    }

    .toggle-btn.active {
      background: var(--wine);
      color: #fff;
    }

    /* ── AMBIENT BAR ─────────────────────────── */
    .ambient-bar {
      max-width: 560px;
      margin: 0.6rem auto 0;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-height: 32px;
    }

    .ambient-label {
      font-size: 0.7rem;
      font-family: system-ui;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .volume-wrap.visible { opacity: 1; pointer-events: auto; }

    .volume-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: var(--blush);
      outline: none;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--wine);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 0 0 3px rgba(217, 107, 16, 0.12);
    }

    .volume-slider::-webkit-slider-thumb:hover {
      transform: scale(1.25);
      box-shadow: 0 0 0 5px rgba(217, 107, 16, 0.18);
    }

    .volume-slider::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: none;
      background: var(--wine);
      cursor: pointer;
    }

    .volume-icon {
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .volume-icon svg {
      width: 14px;
      height: 14px;
      fill: var(--wine);
      opacity: 0.5;
    }

    .scope-label {
      font-size: 0.68rem;
      font-family: system-ui;
      color: var(--text-muted);
      white-space: nowrap;
      min-width: 120px;
    }

    /* ── FEED ────────────────────────────────── */
    .feed {
      max-width: 560px;
      margin: 1.25rem auto 6rem;
      padding: 0 1rem;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    /* ── DAY DIVIDER ─────────────────────────── */
    .day-divider {
      font-size: 0.65rem;
      font-family: system-ui;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 1rem 0 0.25rem;
      opacity: 0.6;
    }

    /* ── POST CARD ───────────────────────────── */
    .post {
      background: var(--cream);
      border-top: 1px solid var(--blush-light);
      padding: 1.25rem 0 1rem;
    }

    .post:first-child {
      border-top: none;
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
    }

    .post-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--blush);
      flex-shrink: 0;
      overflow: hidden;
    }

    .post-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .post-avatar.wine  { background: var(--wine-pale); }
    .post-avatar.blush { background: var(--blush); }
    .post-avatar.cream { background: var(--parchment); }

    .post-meta { flex: 1; }

    .post-handle {
      font-size: 0.8rem;
      font-family: system-ui;
      font-weight: 600;
      color: var(--text);
    }

    .post-time {
      font-size: 0.7rem;
      font-family: system-ui;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .post-body {
      font-size: 0.975rem;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
    }

    .read-more {
      display: inline;
      background: none;
      border: none;
      padding: 0;
      margin-left: 0.25em;
      font-family: system-ui;
      font-size: 0.78rem;
      color: var(--wine-light);
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    .read-more:hover { text-decoration: underline; color: var(--link-hover); }

    a:hover { color: var(--link-hover) !important; }

    .post-footer {
      margin-top: 0.85rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      color: var(--blush);
      margin-left: auto;
      transition: color 0.15s;
    }

    .delete-btn:hover { color: var(--link-hover); }
    .delete-btn svg { width: 13px; height: 13px; fill: currentColor; }

    /* ── DECIBELS ────────────────────────────── */
    .decibels {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      cursor: pointer;
      padding: 4px 0;
    }

    /* 4 bars, ascending heights */
    .decibels .bar:nth-child(1) { width: 3px; height: 6px;  border-radius: 2px; }
    .decibels .bar:nth-child(2) { width: 3px; height: 10px; border-radius: 2px; }
    .decibels .bar:nth-child(3) { width: 3px; height: 15px; border-radius: 2px; }
    .decibels .bar:nth-child(4) { width: 3px; height: 20px; border-radius: 2px; }

    /* unheard: shaded bars = orange-wine, unshaded = light blush */
    .decibels .bar            { background: var(--blush-light); transition: background 0.15s; }
    .decibels[data-level="0"] .bar                    { background: var(--blush-light); }
    .decibels[data-level="1"] .bar:nth-child(1)       { background: var(--wine); }
    .decibels[data-level="2"] .bar:nth-child(-n+2)    { background: var(--wine); }
    .decibels[data-level="3"] .bar:nth-child(-n+3)    { background: var(--wine); }
    .decibels[data-level="4"] .bar                    { background: var(--wine); }

    /* heard: shaded bars = pink, unshaded = light pink */
    .decibels.heard .bar                              { background: #FDDDE6; }
    .decibels.heard[data-level="1"] .bar:nth-child(1)    { background: #E05878; }
    .decibels.heard[data-level="2"] .bar:nth-child(-n+2) { background: #E05878; }
    .decibels.heard[data-level="3"] .bar:nth-child(-n+3) { background: #E05878; }
    .decibels.heard[data-level="4"] .bar                 { background: #E05878; }

    /* hover: nudge toward heard state preview */
    .decibels:not(.heard):hover .bar { background: #F9C4D0; }

    /* ── COMPOSE BUTTON (FAB) ────────────────── */
    .fab {
      position: fixed;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--wine);
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 0.7rem 1.75rem;
      font-size: 0.85rem;
      font-family: system-ui;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: 0 2px 16px rgba(123,59,78,0.22);
      transition: background 0.2s, transform 0.15s;
    }

    .fab:hover { background: var(--link-hover); transform: translateX(-50%) translateY(-1px); }

    .fab.cooldown {
      background: var(--muted);
      cursor: default;
      box-shadow: none;
    }

    .fab.cooldown:hover { transform: translateX(-50%); }

    /* ── COMPOSE SHEET ───────────────────────── */
    .sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(58,42,46,0.3);
      z-index: 20;
      backdrop-filter: blur(2px);
    }

    .sheet-overlay.open { display: block; }

    .sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 560px;
      background: var(--cream);
      border-top: 1px solid var(--blush);
      border-radius: 16px 16px 0 0;
      padding: 1.25rem 1.25rem 1.5rem;
      z-index: 30;
      display: none;
    }

    .sheet.open { display: block; }

    .sheet-handle {
      width: 36px;
      height: 3px;
      background: var(--blush);
      border-radius: 2px;
      margin: 0 auto 1.25rem;
    }

    .sheet textarea {
      width: 100%;
      min-height: 120px;
      background: var(--parchment);
      border: 1px solid var(--blush);
      border-radius: 10px;
      padding: 0.85rem;
      font-family: 'Georgia', serif;
      font-size: 0.975rem;
      color: var(--text);
      line-height: 1.6;
      resize: none;
      outline: none;
    }

    .sheet textarea:focus { border-color: var(--wine-pale); }

    .sheet textarea::placeholder { color: var(--muted); }

    .sheet-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.75rem;
    }

    .char-count {
      font-size: 0.72rem;
      font-family: system-ui;
      color: var(--text-muted);
    }

    .char-count.over { color: var(--wine); }

    .submit-btn {
      background: var(--wine);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 0.5rem 1.25rem;
      font-size: 0.8rem;
      font-family: system-ui;
      cursor: pointer;
    }

    .submit-btn:hover { background: var(--link-hover); }
  </style>
</head>
<body>

<nav>
  <a class="wordmark" href="/hush/" style="text-decoration:none;">hush</a>
  <div class="nav-right">
    <div class="nav-search" id="nav-search">
      <button class="search-btn" onclick="toggleSearch()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </button>
      <input class="search-input" id="search-input" type="text" placeholder="find someone…" oninput="runSearch(this.value)" autocomplete="off">
      <div class="search-results" id="search-results"></div>
    </div>
    <div class="avatar">you</div>
  </div>
</nav>

<div class="sort-bar">
  <span class="sort-label">sort by</span>
  <div class="toggle-group">
    <button class="toggle-btn active" id="btn-chron" onclick="setSort('chron')">time</button>
    <button class="toggle-btn"        id="btn-db"    onclick="setSort('db')">volume</button>
  </div>
</div>

<div class="ambient-bar">
  <span class="ambient-label">ambient noise</span>
  <div class="volume-wrap visible">
    <span class="volume-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
    </span>
    <input type="range" class="volume-slider" id="volume-slider" min="0" max="5" value="0" step="1" oninput="setVolume(this.value)">
    <span class="volume-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    </span>

  </div>
</div>

<div class="feed" id="feed"></div>

<button class="fab" id="fab" onclick="openSheet()">speak</button>

<div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <textarea id="compose-input" placeholder="Say something worth waiting for…" maxlength="999" oninput="updateCount()"></textarea>
  <div class="sheet-footer">
    <span class="char-count" id="char-count">999</span>
    <button class="submit-btn" onclick="submitPost()">post</button>
  </div>
</div>

<script>
  const H = 3600000, D = 86400000;
  const POSTS = [
    {id:1,  handle:"@margaux", avatarClass:"cream", time:"4h ago",  body:"The light in January is thin and honest. It doesn't flatter anything — not the buildings, not the people. But it's the only light that feels true.", decibels:1200, heard:false, ts:Date.now()-4*H},
    {id:2,  handle:"@roxy",    avatarClass:"wine",  time:"7h ago",  body:"Every club has a Tuesday night when it reveals its real self. No dress code, no hype, just whoever actually loves the music. That's the night you want.", decibels:84, heard:false, ts:Date.now()-7*H},
    {id:3,  handle:"@tina",    avatarClass:"blush", time:"9h ago",  body:"She wore the same earrings to three events in a row and somehow each time they meant something different. That's not a wardrobe. That's a language.", decibels:7, heard:true, ts:Date.now()-9*H},
    {id:4,  handle:"@celeste", avatarClass:"cream", time:"11h ago", body:"A restaurant that serves only one thing perfectly is making a statement about patience. You either believe in it or you don't.", decibels:430, heard:false, ts:Date.now()-11*H},
    {id:5,  handle:"@margaux", avatarClass:"cream", time:"1d ago",  body:"Borrowed a friend's apartment for a week. The hardest part was learning which silence was restful and which was just empty.", decibels:0, heard:false, ts:Date.now()-1*D},
    {id:6,  handle:"@celeste", avatarClass:"cream", time:"2d ago",  body:"There's a particular kind of restaurant that exists only in the imagination of people who've never had to run one. Everything is sourced locally, the menu changes daily, the staff are paid fairly, the space is beautiful, and somehow it's also affordable. People describe this place like it's obvious. Like the math just works if you care enough. I've eaten at enough places to know the math never works. Something always gives. Usually it's the staff. Sometimes it's the sourcing. Occasionally it's the owner's savings. The restaurants I trust most are the ones that've clearly made a choice about what they're willing to compromise on — and own it.", decibels:4, heard:false, ts:Date.now()-2*D},
    {id:7,  handle:"@roxy",    avatarClass:"wine",  time:"2d ago",  body:"The DJ who plays to an empty floor at 1am and doesn't change a single thing — that's commitment. Or delusion. The line is thin and honestly that's the appeal.", decibels:210, heard:false, ts:Date.now()-2*D-H},
    {id:8,  handle:"@tina",    avatarClass:"blush", time:"3d ago",  body:"There is one person in every city who knows everything and tells you just enough to make you desperate for more. Find them. Befriend them. Never cross them.", decibels:980, heard:false, ts:Date.now()-3*D},
    {id:9,  handle:"@margaux", avatarClass:"cream", time:"3d ago",  body:"There's a particular tyranny in a room that's been perfectly decorated. No one sits down. No one moves anything. You're a guest in a photograph.", decibels:312, heard:false, ts:Date.now()-3*D-H},
    {id:10, handle:"@celeste", avatarClass:"cream", time:"3d ago",  body:"The bread arrived cold. I didn't say anything. But I noticed. I always notice.", decibels:88, heard:false, ts:Date.now()-3*D-2*H},
    {id:11, handle:"@tina",    avatarClass:"blush", time:"4d ago",  body:"Two people left the same party early. Neither of them went home. I'm choosing not to elaborate.", decibels:4400, heard:false, ts:Date.now()-4*D},
    {id:12, handle:"@roxy",    avatarClass:"wine",  time:"4d ago",  body:"Went somewhere new. Terrible sound system. Full room. Best night in months. I'm done having opinions about venues.", decibels:730, heard:false, ts:Date.now()-4*D-H},
    {id:13, handle:"@tina",    avatarClass:"blush", time:"4d ago",  body:"The rumor was wrong in every specific detail and completely correct in every essential one.", decibels:55, heard:false, ts:Date.now()-4*D-2*H},
    {id:14, handle:"@margaux", avatarClass:"cream", time:"5d ago",  body:"The best-dressed people I know never talk about clothes.", decibels:8, heard:false, ts:Date.now()-5*D},
    {id:15, handle:"@celeste", avatarClass:"cream", time:"5d ago",  body:"A menu that hasn't changed in twenty years is either a monument or a warning. Last night I couldn't tell which.", decibels:1560, heard:false, ts:Date.now()-5*D-H},
    {id:16, handle:"@roxy",    avatarClass:"wine",  time:"6d ago",  body:"The after-party that outlives the party is always in someone's apartment and always ends with a conversation you remember for years.", decibels:44, heard:false, ts:Date.now()-6*D},
    {id:17, handle:"@margaux", avatarClass:"cream", time:"7d ago",  body:"Vintage is not a style. It's an argument about time.", decibels:540, heard:false, ts:Date.now()-7*D},
    {id:18, handle:"@tina",    avatarClass:"blush", time:"7d ago",  body:"There's a name I keep hearing in very different rooms. I'm paying attention.", decibels:130, heard:false, ts:Date.now()-7*D-H},
    {id:19, handle:"@celeste", avatarClass:"cream", time:"8d ago",  body:"Ate alone at the bar. The bartender told me about a restaurant four blocks away that closed last year. It sounded perfect. I'm still mourning it.", decibels:7, heard:false, ts:Date.now()-8*D},
    {id:20, handle:"@roxy",    avatarClass:"wine",  time:"8d ago",  body:"Closing time is the only honest moment in a nightclub. Watch who stays.", decibels:2100, heard:false, ts:Date.now()-8*D-H},
    {id:21, handle:"@tina",    avatarClass:"blush", time:"8d ago",  body:"He apologized publicly. The people who deserved the apology were not notified.", decibels:9, heard:false, ts:Date.now()-8*D-2*H},
    {id:22, handle:"@margaux", avatarClass:"cream", time:"9d ago",  body:"She stopped wearing color for a year and somehow became more visible.", decibels:23, heard:false, ts:Date.now()-9*D},
    {id:23, handle:"@celeste", avatarClass:"cream", time:"10d ago", body:"Price is information. A cheap meal that makes you feel expensive is the highest form of the art.", decibels:3200, heard:false, ts:Date.now()-10*D},
    {id:24, handle:"@roxy",    avatarClass:"wine",  time:"10d ago", body:"A city's nightlife is its id. Everything else is the ego working overtime.", decibels:17, heard:false, ts:Date.now()-10*D-H},
    {id:25, handle:"@tina",    avatarClass:"blush", time:"10d ago", body:"The thing about an open secret is that everyone's silence is a choice.", decibels:620, heard:false, ts:Date.now()-10*D-2*H},
    {id:26, handle:"@margaux", avatarClass:"cream", time:"11d ago", body:"The city in February: everyone dressed for somewhere warmer, moving fast enough that it almost works.", decibels:1800, heard:false, ts:Date.now()-11*D},
    {id:27, handle:"@roxy",    avatarClass:"wine",  time:"11d ago", body:"She danced alone for an hour before anyone noticed. By the end, the whole room had reorganized itself around her.", decibels:390, heard:false, ts:Date.now()-11*D-H},
    {id:28, handle:"@celeste", avatarClass:"cream", time:"12d ago", body:"The dessert was an apology for the main course. I accepted it. I shouldn't have.", decibels:19, heard:false, ts:Date.now()-12*D},
    {id:29, handle:"@tina",    avatarClass:"blush", time:"12d ago", body:"She left the group chat. No one mentioned it for three days. Then everyone mentioned it at once.", decibels:2, heard:false, ts:Date.now()-12*D-H},
    {id:30, handle:"@margaux", avatarClass:"cream", time:"13d ago", body:"A scarf tied correctly says something specific about where you grew up. I've never been able to replicate it.", decibels:66, heard:false, ts:Date.now()-13*D},
    {id:31, handle:"@roxy",    avatarClass:"wine",  time:"13d ago", body:"The music you danced to at 23 will embarrass you and also save you. Simultaneously. For the rest of your life.", decibels:1, heard:false, ts:Date.now()-13*D-H},
    {id:32, handle:"@celeste", avatarClass:"cream", time:"13d ago", body:"Best meal of the year so far. I won't tell you where. You'll ruin it.", decibels:670, heard:false, ts:Date.now()-13*D-2*H},
    {id:33, handle:"@tina",    avatarClass:"blush", time:"13d ago", body:"I was asked not to write about this. So I'm writing about the fact that I was asked.", decibels:8800, heard:false, ts:Date.now()-13*D-3*H},
  ];

  const USERS = [
    { handle: '@margaux',  avatarClass: 'cream' },
    { handle: '@roxy',     avatarClass: 'wine'  },
    { handle: '@tina',     avatarClass: 'blush' },
    { handle: '@celeste',  avatarClass: 'cream' },
  ];

  let searchOpen = false;

  function toggleSearch() {
    searchOpen = !searchOpen;
    const wrap = document.getElementById('nav-search');
    wrap.classList.toggle('open', searchOpen);
    if (searchOpen) {
      document.getElementById('search-input').focus();
    } else {
      document.getElementById('search-input').value = '';
      document.getElementById('search-results').classList.remove('open');
    }
  }

  function runSearch(q) {
    const res = document.getElementById('search-results');
    q = q.trim().toLowerCase();
    if (!q) { res.classList.remove('open'); return; }
    const hits = USERS.filter(u => u.handle.toLowerCase().includes(q));
    res.innerHTML = hits.length
      ? hits.map(u => `
          <a class="search-result" href="/hush/profile.html?u=${encodeURIComponent(u.handle)}">
            <div class="search-result-avatar ${u.avatarClass}"></div>
            <span class="search-result-handle">${u.handle}</span>
          </a>`).join('')
      : `<div class="search-no-results">no one found</div>`;
    res.classList.add('open');
  }

  let sortMode = 'chron';
  let nextId = 100;
  const hasCooldown = false;
  let ambientVolume = 0;

  const SCOPE_LABELS = [
    'your feed',
    'mutuals of mutuals',
    'people your mutuals follow',
    'people you follow (+ their follows)',
    'one more ring out',
    'everyone'
  ];

  function setVolume(v) {
    ambientVolume = parseInt(v);
    updateSliderFill();
    updateScopeLabel();
    renderPosts();
  }

  function updateSliderFill() {
    const slider = document.getElementById('volume-slider');
    const pct = (ambientVolume / 5) * 100;
    slider.style.background = `linear-gradient(to right, var(--wine) ${pct}%, var(--blush) ${pct}%)`;
  }

  function updateScopeLabel() {}

  function dbLevel(n) {
    if (n === 0)    return 0;
    if (n < 10)     return 1;
    if (n < 100)    return 2;
    if (n < 1000)   return 3;
    return 4;
  }

  function renderPosts() {
    let sorted;
    if (sortMode === 'chron') {
      sorted = [...POSTS].sort((a, b) => b.ts - a.ts);
    } else {
      // Group into 24h buckets (day 0 = most recent), sort each bucket by decibels
      const now = Date.now();
      const DAY = 86400000;
      const withBucket = POSTS.map(p => ({
        ...p,
        bucket: Math.floor((now - p.ts) / DAY)
      }));
      withBucket.sort((a, b) => a.bucket - b.bucket || b.decibels - a.decibels);
      sorted = withBucket;
    }

    let lastBucket = -1;
    document.getElementById('feed').innerHTML = sorted.map(p => {
      let divider = '';
      if (sortMode === 'db' && p.bucket !== lastBucket) {
        lastBucket = p.bucket;
        const label = p.bucket === 0 ? 'today' : p.bucket === 1 ? 'yesterday' : `${p.bucket} days ago`;
        divider = `<div class="day-divider">${label}</div>`;
      }
      const FOLD = 333;
      const folded = p.body.length > FOLD && !p.expanded;
      const bodyText = folded ? p.body.slice(0, FOLD).trimEnd() : p.body;
      const moreBtn = folded
        ? `<button class="read-more" onclick="expandPost(${p.id})">… read more</button>`
        : '';
      return divider + `
      <div class="post">
        <div class="post-header">
          <a href="/hush/profile.html?u=${encodeURIComponent(p.handle)}" style="flex-shrink:0;"><div class="post-avatar ${p.avatarClass}"></div></a>
          <div class="post-meta">
            <a class="post-handle" href="/hush/profile.html?u=${encodeURIComponent(p.handle)}" style="text-decoration:none;color:inherit;">${p.handle}</a>
            <div class="post-time">${p.time}</div>
          </div>
        </div>
        <div class="post-body">${bodyText}${moreBtn}</div>
        <div class="post-footer">
          <div class="decibels ${p.heard ? 'heard' : ''}" data-level="${dbLevel(p.decibels)}" data-id="${p.id}" onclick="toggleHeard(${p.id})">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
          </div>
          ${p.handle === '@you' ? `<button class="delete-btn" onclick="deletePost(${p.id})"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>` : ''}
        </div>
      </div>
    `}).join('');
  }

  function expandPost(id) {
    const p = POSTS.find(x => x.id === id);
    if (p) { p.expanded = true; renderPosts(); }
  }

  function deletePost(id) {
    const i = POSTS.findIndex(x => x.id === id);
    if (i !== -1) { POSTS.splice(i, 1); renderPosts(); }
    // cooldown intentionally unaffected — deletion doesn't reset the 24h window
  }

  function toggleHeard(id) {
    const p = POSTS.find(x => x.id === id);
    if (!p) return;
    p.heard = !p.heard;
    p.decibels += p.heard ? 1 : -1;
    renderPosts();
  }

  function setSort(mode) {
    sortMode = mode;
    document.getElementById('btn-chron').classList.toggle('active', mode === 'chron');
    document.getElementById('btn-db').classList.toggle('active',    mode === 'db');
    renderPosts();
  }

  function openSheet() {
    if (hasCooldown) return;
    document.getElementById('sheet').classList.add('open');
    document.getElementById('overlay').classList.add('open');
    document.getElementById('compose-input').focus();
  }

  function closeSheet() {
    document.getElementById('sheet').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }

  function updateCount() {
    const input = document.getElementById('compose-input');
    const rem = 999 - input.value.length;
    const el = document.getElementById('char-count');
    el.textContent = rem;
    el.classList.toggle('over', rem < 20);
  }

  function submitPost() {
    const input = document.getElementById('compose-input');
    const text = input.value.trim();
    if (!text) return;
    POSTS.unshift({
      id: nextId++,
      handle: "@you",
      avatarClass: "wine",
      time: "just now",
      body: text,
      decibels: 0,
      heard: false,
      ts: Date.now()
    });
    input.value = '';
    updateCount();
    closeSheet();
    setSort('chron');
  }

  if (hasCooldown) {
    const fab = document.getElementById('fab');
    fab.textContent = '18h 22m to speak';
    fab.classList.add('cooldown');
  }

  updateSliderFill();
  updateScopeLabel();
  renderPosts();
</script>
</body>
</html>
