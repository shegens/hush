<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hush — pink palette</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:    #FDF6EE;
      --wine:     #D96B10;
      --text:     #221206;
      --muted:    #8C5828;
    }

    body {
      background: var(--cream);
      color: var(--text);
      font-family: system-ui, sans-serif;
      padding: 2rem 1.5rem 4rem;
      max-width: 600px;
      margin: 0 auto;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .wordmark {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 1.2rem;
      color: var(--wine);
      text-decoration: none;
    }

    h1 {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .section {
      margin-bottom: 2.5rem;
    }

    .section-title {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .swatches {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--wine);
      border-radius: 10px;
      overflow: hidden;
    }

    .swatch {
      display: flex;
      align-items: center;
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--wine);
      cursor: pointer;
      transition: opacity 0.1s;
      gap: 1rem;
    }

    .swatch:last-child { border-bottom: none; }
    .swatch:hover { opacity: 0.85; }

    .swatch-block {
      width: 48px;
      height: 28px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .swatch-info { flex: 1; }

    .swatch-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
    }

    .swatch-hex {
      font-size: 0.7rem;
      color: var(--muted);
      font-family: monospace;
      margin-top: 2px;
    }

    .swatch-desc {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 1px;
    }

    /* demo row showing all 3 tones in context */
    .demo-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      align-items: flex-end;
    }

    .demo-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
    }

    .demo-bars .b {
      width: 4px;
      border-radius: 2px;
    }

    .demo-heard-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-right: 0.5rem;
    }

    .demo-btn {
      padding: 0.35rem 0.9rem;
      border-radius: 16px;
      border: none;
      font-size: 0.75rem;
      font-family: system-ui;
      cursor: default;
    }

    .copied {
      font-size: 0.65rem;
      color: var(--wine);
      opacity: 0;
      transition: opacity 0.3s;
      margin-left: auto;
    }

    .copied.show { opacity: 1; }
  </style>
</head>
<body>

<nav>
  <a class="wordmark" href="/hush/">hush</a>
</nav>

<h1>pink palette picker</h1>

<div class="section">
  <div class="section-title">preview: heard state in context</div>
  <div class="swatches" id="swatches-preview"></div>
</div>

<script>
  // One color per family. Opacity handles unheard (0.2) → hover (0.5) → heard (1.0)
  const PREVIEW = [
    { name: 'dusty rose',      color:'#E8909A', desc:'muted, vintage' },
    { name: 'petal',           color:'#E89088', desc:'warm blush, slight peach' },
    { name: 'old rose',        color:'#D88880', desc:'antique warmth, earthy' },
    { name: 'soft coral-pink', color:'#E88890', desc:'warm, not orange' },
    { name: 'tea rose',        color:'#E89080', desc:'warm, peachy undertone' },
    { name: 'ballet slipper',  color:'#EAA0A8', desc:'pale, classic blush' },
    { name: 'faded carnation',  color:'#F07888', desc:'warm carnation, lifted' },
    { name: 'carnation',        color:'#F06878', desc:'classic carnation, warm' },
    { name: 'deep carnation',   color:'#E85868', desc:'rich, full saturation' },
    { name: 'carnation bright', color:'#F46070', desc:'vivid, warm red-pink' },
    { name: 'carnation blush',  color:'#F08088', desc:'softer, more blush' },
  ];

  const ORANGE = '#D96B10';

  function bars(color, opacity, level) {
    const heights = [6, 10, 15, 20];
    return heights.map((h, i) =>
      `<div class="b" style="height:${h}px;background:${color};opacity:${i < level ? opacity : 0.3}"></div>`
    ).join('');
  }

  function orangeBars(level) {
    const heights = [6, 10, 15, 20];
    return heights.map((h, i) =>
      `<div class="b" style="height:${h}px;background:${ORANGE};opacity:${i < level ? 1 : 0.25}"></div>`
    ).join('');
  }

  const previewContainer = document.getElementById('swatches-preview');
  PREVIEW.forEach(p => {
    const div = document.createElement('div');
    div.className = 'swatch';
    div.style.flexDirection = 'column';
    div.style.alignItems = 'flex-start';
    div.style.gap = '0.75rem';
    div.innerHTML = `
      <div style="display:flex;align-items:baseline;gap:0.5rem">
        <div style="font-size:0.8rem;font-weight:600;color:var(--text)">${p.name}</div>
        <div style="font-size:0.65rem;font-family:monospace;color:var(--muted)">${p.color}</div>
      </div>
      <div style="font-size:0.68rem;color:var(--muted);margin-top:-8px">${p.desc}</div>
      <div class="demo-row">
        <span class="demo-heard-label">unheard</span>
        <div class="demo-bars">${orangeBars(3)}</div>
        <span class="demo-heard-label" style="margin-left:1.25rem">hover</span>
        <div class="demo-bars">${bars(p.color, 0.5, 3)}</div>
        <span class="demo-heard-label" style="margin-left:1.25rem">heard</span>
        <div class="demo-bars">${bars(p.color, 1, 3)}</div>
        <button class="demo-btn" style="margin-left:1.25rem;background:${p.color};color:#fff;opacity:1">tune in</button>
        <button class="demo-btn" style="margin-left:0.5rem;background:transparent;color:${p.color};border:1px solid ${p.color};opacity:0.7">tuned</button>
      </div>
    `;
    previewContainer.appendChild(div);
  });


</script>
</body>
</html>
