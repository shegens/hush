<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hush — profile</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:       #FDF6EE;
      --parchment:   #F7EDE2;
      --blush:       #F9C49A;
      --blush-light: #FCDFC4;
      --muted:       rgba(215, 120, 40, 0.25);
      --wine:        #D96B10;
      --wine-light:  #F08030;
      --wine-pale:   rgba(215, 120, 40, 0.15);
      --text:        #221206;
      --text-muted:  #8C5828;
      --link-hover:  #E87060;
    }

    body {
      background: var(--cream);
      color: var(--text);
      font-family: 'Georgia', serif;
      min-height: 100vh;
    }

    a:hover { color: var(--link-hover) !important; }

    /* ── NAV ─────────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--cream);
      border-bottom: 1px solid var(--blush);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 52px;
    }

    .wordmark {
      font-size: 1.25rem;
      font-style: italic;
      color: var(--wine);
      letter-spacing: 0.04em;
      text-decoration: none;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--blush);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: var(--wine);
      font-style: normal;
      font-family: system-ui;
      cursor: pointer;
    }

    .nav-search {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
      max-width: 240px;
    }

    .search-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      color: var(--text-muted);
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .search-btn:hover { color: var(--wine); }
    .search-btn svg { width: 15px; height: 15px; fill: currentColor; }

    .search-input {
      width: 0; max-width: 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid transparent;
      padding: 0.25rem 0;
      font-family: system-ui;
      font-size: 0.82rem;
      color: var(--text);
      outline: none;
      transition: width 0.25s ease, max-width 0.25s ease, border-color 0.25s ease;
      overflow: hidden;
    }

    .nav-search.open .search-input { width: 160px; max-width: 160px; border-bottom-color: var(--blush); }
    .nav-search.open .search-input:focus { border-bottom-color: var(--wine-light); }
    .search-input::placeholder { color: var(--muted); }

    .search-results {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: 220px;
      background: var(--cream);
      border: 1px solid var(--blush-light);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(44,26,18,0.08);
      display: none;
      z-index: 50;
    }

    .search-results.open { display: block; }

    .search-result {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.65rem 1rem;
      cursor: pointer;
      transition: background 0.1s;
      text-decoration: none;
    }

    .search-result:hover { background: var(--parchment); }

    .search-result-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--blush);
      flex-shrink: 0;
    }

    .search-result-avatar.wine  { background: var(--wine-pale); }
    .search-result-avatar.blush { background: var(--blush); }
    .search-result-avatar.cream { background: var(--parchment); }

    .search-result-handle {
      font-size: 0.8rem;
      font-family: system-ui;
      font-weight: 600;
      color: var(--text);
    }

    .search-no-results {
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-family: system-ui;
      color: var(--text-muted);
    }

    /* ── PROFILE HEADER ──────────────────────── */
    .profile-wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    .profile-header {
      padding: 2rem 0 1.25rem;
      display: flex;
      align-items: flex-start;
      gap: 1.25rem;
    }

    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .profile-avatar.wine  { background: var(--wine-pale); }
    .profile-avatar.blush { background: var(--blush); }
    .profile-avatar.cream { background: var(--parchment); }

    .profile-info { flex: 1; }

    .profile-handle {
      font-size: 1rem;
      font-family: system-ui;
      font-weight: 700;
      color: #5C2E0E;
    }

    .profile-bio {
      font-size: 0.875rem;
      line-height: 1.6;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }

    .profile-stats {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }

    .stat {
      font-family: system-ui;
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .stat strong {
      display: block;
      font-size: 0.95rem;
      color: #5C2E0E;
      letter-spacing: 0;
      text-transform: none;
      margin-bottom: 1px;
    }

    .follow-btn {
      background: var(--wine);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 0.45rem 1.2rem;
      font-size: 0.78rem;
      font-family: system-ui;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .follow-btn:hover { background: var(--link-hover); border-color: var(--link-hover); color: #fff; }
    .follow-btn.following {
      background: transparent;
      color: var(--wine);
      border: 1px solid var(--blush);
    }

    /* ── DIVIDER ──────────────────────────────── */
    .profile-divider {
      border: none;
      border-top: 1px solid var(--blush-light);
      margin: 0;
    }

    /* ── POST CARDS (same as feed) ───────────── */
    .feed {
      display: flex;
      flex-direction: column;
      gap: 1px;
      padding-bottom: 4rem;
    }

    .post {
      background: var(--cream);
      border-top: 1px solid var(--blush-light);
      padding: 1.25rem 0 1rem;
    }

    .post:first-child { border-top: none; }

    .post-body {
      font-size: 0.975rem;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
    }

    .post-time {
      font-size: 0.7rem;
      font-family: system-ui;
      color: var(--text-muted);
      margin-bottom: 0.65rem;
    }

    .post-footer {
      margin-top: 0.85rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      color: var(--blush);
      margin-left: auto;
      transition: color 0.15s;
    }

    .delete-btn:hover { color: var(--link-hover); }
    .delete-btn svg { width: 13px; height: 13px; fill: currentColor; }

    /* ── DECIBELS (same) ──────────────────────── */
    .decibels {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      cursor: pointer;
      padding: 4px 0;
    }

    .decibels .bar:nth-child(1) { width: 3px; height: 6px;  border-radius: 2px; }
    .decibels .bar:nth-child(2) { width: 3px; height: 10px; border-radius: 2px; }
    .decibels .bar:nth-child(3) { width: 3px; height: 15px; border-radius: 2px; }
    .decibels .bar:nth-child(4) { width: 3px; height: 20px; border-radius: 2px; }

    .decibels .bar            { background: var(--blush-light); transition: background 0.15s; }
    .decibels[data-level="1"] .bar:nth-child(1)       { background: var(--wine); }
    .decibels[data-level="2"] .bar:nth-child(-n+2)    { background: var(--wine); }
    .decibels[data-level="3"] .bar:nth-child(-n+3)    { background: var(--wine); }
    .decibels[data-level="4"] .bar                    { background: var(--wine); }

    .decibels.heard .bar                              { background: #FFD0C8; }
    .decibels.heard[data-level="1"] .bar:nth-child(1)    { background: #E8604A; }
    .decibels.heard[data-level="2"] .bar:nth-child(-n+2) { background: #E8604A; }
    .decibels.heard[data-level="3"] .bar:nth-child(-n+3) { background: #E8604A; }
    .decibels.heard[data-level="4"] .bar                 { background: #E8604A; }

    .decibels:not(.heard):hover .bar { background: #FFBFB0; }

    .read-more {
      display: inline;
      background: none;
      border: none;
      padding: 0;
      margin-left: 0.25em;
      font-family: system-ui;
      font-size: 0.78rem;
      color: var(--wine-light);
      cursor: pointer;
    }

    .read-more:hover { text-decoration: underline; color: var(--link-hover); }

    /* ── NOT FOUND ───────────────────────────── */
    .not-found {
      text-align: center;
      padding: 4rem 1rem;
      font-family: system-ui;
      color: var(--text-muted);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>

<nav>
  <a class="wordmark" href="/hush/">hush</a>
  <div class="nav-right">
    <div class="nav-search" id="nav-search">
      <button class="search-btn" onclick="toggleSearch()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </button>
      <input class="search-input" id="search-input" type="text" placeholder="find someone…" oninput="runSearch(this.value)" autocomplete="off">
      <div class="search-results" id="search-results"></div>
    </div>
    <div class="avatar">you</div>
  </div>
</nav>

<div class="profile-wrap">
  <div id="profile-root"></div>
</div>

<script>
  const H = 3600000, D = 86400000;
  const USERS = {
    '@margaux': {
      handle: '@margaux', avatarClass: 'cream',
      bio: 'Style columnist. Watching the city dress itself every morning.',
      frequency: 1,
      posts: [
        { id:101, body: "The light in January is thin and honest. It doesn't flatter anything — not the buildings, not the people. But it's the only light that feels true.", time:'4h ago', decibels:1200, heard:false, ts:Date.now()-4*H },
        { id:102, body: "Borrowed a friend's apartment for a week. The hardest part was learning which silence was restful and which was just empty.", time:'1d ago', decibels:0, heard:false, ts:Date.now()-1*D },
        { id:103, body: "A coat is the last thing you put on before the world sees you and the first thing it sees. People underestimate the coat.", time:'2d ago', decibels:47, heard:false, ts:Date.now()-2*D },
        { id:104, body: "There's a particular tyranny in a room that's been perfectly decorated. No one sits down. No one moves anything. You're a guest in a photograph.", time:'3d ago', decibels:312, heard:false, ts:Date.now()-3*D },
        { id:105, body: "The best-dressed people I know never talk about clothes.", time:'5d ago', decibels:8, heard:false, ts:Date.now()-5*D },
        { id:106, body: "Vintage is not a style. It's an argument about time.", time:'7d ago', decibels:540, heard:false, ts:Date.now()-7*D },
        { id:107, body: "She stopped wearing color for a year and somehow became more visible.", time:'9d ago', decibels:23, heard:false, ts:Date.now()-9*D },
        { id:108, body: "The city in February: everyone dressed for somewhere warmer, moving fast enough that it almost works.", time:'11d ago', decibels:1800, heard:false, ts:Date.now()-11*D },
        { id:109, body: "A scarf tied correctly says something specific about where you grew up. I've never been able to replicate it.", time:'13d ago', decibels:66, heard:false, ts:Date.now()-13*D },
      ]
    },
    '@roxy': {
      handle: '@roxy', avatarClass: 'wine',
      bio: "Nightlife columnist. I write about the hours you don't remember.",
      frequency: 2,
      posts: [
        { id:201, body: "Every club has a Tuesday night when it reveals its real self. No dress code, no hype, just whoever actually loves the music. That's the night you want.", time:'7h ago', decibels:84, heard:false, ts:Date.now()-7*H },
        { id:202, body: "The DJ who plays to an empty floor at 1am and doesn't change a single thing — that's commitment. Or delusion. The line is thin and honestly that's the appeal.", time:'2d ago', decibels:210, heard:false, ts:Date.now()-2*D },
        { id:203, body: "A good bouncer is reading a novel with their eyes. A great bouncer is writing one.", time:'3d ago', decibels:5, heard:false, ts:Date.now()-3*D },
        { id:204, body: "Went somewhere new. Terrible sound system. Full room. Best night in months. I'm done having opinions about venues.", time:'4d ago', decibels:730, heard:false, ts:Date.now()-4*D },
        { id:205, body: "The after-party that outlives the party is always in someone's apartment and always ends with a conversation you remember for years.", time:'6d ago', decibels:44, heard:false, ts:Date.now()-6*D },
        { id:206, body: "Closing time is the only honest moment in a nightclub. Watch who stays.", time:'8d ago', decibels:2100, heard:false, ts:Date.now()-8*D },
        { id:207, body: "A city's nightlife is its id. Everything else is the ego working overtime.", time:'10d ago', decibels:17, heard:false, ts:Date.now()-10*D },
        { id:208, body: "She danced alone for an hour before anyone noticed. By the end, the whole room had reorganized itself around her.", time:'11d ago', decibels:390, heard:false, ts:Date.now()-11*D },
        { id:209, body: "The music you danced to at 23 will embarrass you and also save you. Simultaneously. For the rest of your life.", time:'13d ago', decibels:1, heard:false, ts:Date.now()-13*D },
      ]
    },
    '@tina': {
      handle: '@tina', avatarClass: 'blush',
      bio: "Gossip columnist. Everything I write is true, especially the parts that aren't.",
      frequency: 0,
      posts: [
        { id:301, body: "She wore the same earrings to three events in a row and somehow each time they meant something different. That's not a wardrobe. That's a language.", time:'9h ago', decibels:7, heard:true, ts:Date.now()-9*H },
        { id:302, body: "There is one person in every city who knows everything and tells you just enough to make you desperate for more. Find them. Befriend them. Never cross them.", time:'3d ago', decibels:980, heard:false, ts:Date.now()-3*D },
        { id:303, body: "The rumor was wrong in every specific detail and completely correct in every essential one.", time:'4d ago', decibels:55, heard:false, ts:Date.now()-4*D },
        { id:304, body: "Two people left the same party early. Neither of them went home. I'm choosing not to elaborate.", time:'5d ago', decibels:4400, heard:false, ts:Date.now()-5*D },
        { id:305, body: "There's a name I keep hearing in very different rooms. I'm paying attention.", time:'7d ago', decibels:130, heard:false, ts:Date.now()-7*D },
        { id:306, body: "He apologized publicly. The people who deserved the apology were not notified.", time:'8d ago', decibels:9, heard:false, ts:Date.now()-8*D },
        { id:307, body: "The thing about an open secret is that everyone's silence is a choice.", time:'10d ago', decibels:620, heard:false, ts:Date.now()-10*D },
        { id:308, body: "She left the group chat. No one mentioned it for three days. Then everyone mentioned it at once.", time:'12d ago', decibels:2, heard:false, ts:Date.now()-12*D },
        { id:309, body: "I was asked not to write about this. So I'm writing about the fact that I was asked.", time:'13d ago', decibels:8800, heard:false, ts:Date.now()-13*D },
      ]
    },
    '@celeste': {
      handle: '@celeste', avatarClass: 'cream',
      bio: 'Dining critic. I eat for a living and I take it personally.',
      frequency: 3,
      posts: [
        { id:401, body: "A restaurant that serves only one thing perfectly is making a statement about patience. You either believe in it or you don't.", time:'11h ago', decibels:430, heard:false, ts:Date.now()-11*H },
        { id:402, body: "There's a particular kind of restaurant that exists only in the imagination of people who've never had to run one. Everything is sourced locally, the menu changes daily, the staff are paid fairly, the space is beautiful, and somehow it's also affordable. People describe this place like it's obvious. Like the math just works if you care enough. I've eaten at enough places to know the math never works. Something always gives. Usually it's the staff. Sometimes it's the sourcing. Occasionally it's the owner's savings. The restaurants I trust most are the ones that've clearly made a choice about what they're willing to compromise on — and own it.", time:'2d ago', decibels:4, heard:false, ts:Date.now()-2*D },
        { id:403, body: "The bread arrived cold. I didn't say anything. But I noticed. I always notice.", time:'3d ago', decibels:88, heard:false, ts:Date.now()-3*D },
        { id:404, body: "A menu that hasn't changed in twenty years is either a monument or a warning. Last night I couldn't tell which.", time:'5d ago', decibels:1560, heard:false, ts:Date.now()-5*D },
        { id:405, body: "The chef came out to the table. He wanted to know what I thought. I told him. He looked like he'd heard it before and was still deciding whether to believe it.", time:'6d ago', decibels:33, heard:false, ts:Date.now()-6*D },
        { id:406, body: "Ate alone at the bar. The bartender told me about a restaurant four blocks away that closed last year. It sounded perfect. I'm still mourning it.", time:'8d ago', decibels:7, heard:false, ts:Date.now()-8*D },
        { id:407, body: "Price is information. A cheap meal that makes you feel expensive is the highest form of the art.", time:'10d ago', decibels:3200, heard:false, ts:Date.now()-10*D },
        { id:408, body: "The dessert was an apology for the main course. I accepted it. I shouldn't have.", time:'12d ago', decibels:19, heard:false, ts:Date.now()-12*D },
        { id:409, body: "Best meal of the year so far. I won't tell you where. You'll ruin it.", time:'13d ago', decibels:670, heard:false, ts:Date.now()-13*D },
      ]
    }
  };

  const params = new URLSearchParams(location.search);
  const handle = decodeURIComponent(params.get('u') || '');
  const user = USERS[handle];
  const root = document.getElementById('profile-root');

  if (!user) {
    root.innerHTML = `<div class="not-found">no one here by that name</div>`;
  } else {
    document.title = `hush — ${user.handle}`;

    let following = false;

    function dbLevel(n) {
      if (n === 0) return 0;
      if (n < 10)  return 1;
      if (n < 100) return 2;
      if (n < 1000)return 3;
      return 4;
    }

    function renderProfile() {
      const FOLD = 333;
      const postsHtml = user.posts.map(p => {
        const folded = p.body.length > FOLD && !p.expanded;
        const body = folded ? p.body.slice(0, FOLD).trimEnd() : p.body;
        const more = folded ? `<button class="read-more" onclick="expandPost(${p.id})">… read more</button>` : '';
        return `
        <div class="post">
          <div class="post-time">${p.time}</div>
          <div class="post-body">${body}${more}</div>
          <div class="post-footer">
            <div class="decibels ${p.heard ? 'heard' : ''}" data-level="${dbLevel(p.decibels)}" onclick="toggleHeard(${p.id})">
              <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
            <button class="delete-btn" onclick="deletePost(${p.id})"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
          </div>
        </div>`;
      }).join('');

      root.innerHTML = `
        <div class="profile-header">
          <div class="profile-avatar ${user.avatarClass}"></div>
          <div class="profile-info">
            <div class="profile-handle">${user.handle}</div>
            <div class="profile-bio">${user.bio}</div>
            <div class="profile-stats">
              <div class="stat"><strong>${user.posts.length}</strong>posts</div>
              <div class="stat"><strong>${user.frequency}</strong>frequency</div>
              <button class="follow-btn ${following ? 'following' : ''}" onclick="toggleFollow()">${following ? 'tuned' : 'tune in'}</button>
            </div>
          </div>
        </div>
        <hr class="profile-divider">
        <div class="feed">${postsHtml}</div>
      `;
    }

    const originalFrequency = user.frequency;

    function toggleFollow() {
      following = !following;
      user.frequency = following ? 0 : originalFrequency;
      renderProfile();
    }

    function expandPost(id) {
      const p = user.posts.find(x => x.id === id);
      if (p) { p.expanded = true; renderProfile(); }
    }

    function deletePost(id) {
      const i = user.posts.findIndex(x => x.id === id);
      if (i !== -1) { user.posts.splice(i, 1); renderProfile(); }
    }

    window.deletePost = deletePost;

    function toggleHeard(id) {
      const p = user.posts.find(x => x.id === id);
      if (!p) return;
      p.heard = !p.heard;
      p.decibels += p.heard ? 1 : -1;
      renderProfile();
    }

    // expose to inline onclick
    window.toggleFollow = toggleFollow;
    window.expandPost = expandPost;
    window.toggleHeard = toggleHeard;

    renderProfile();
  }

  // ── NAV SEARCH ──────────────────────────────
  const NAV_USERS = [
    { handle: '@margaux', avatarClass: 'cream' },
    { handle: '@roxy',    avatarClass: 'wine'  },
    { handle: '@tina',    avatarClass: 'blush' },
    { handle: '@celeste', avatarClass: 'cream' },
  ];

  let searchOpen = false;

  function toggleSearch() {
    searchOpen = !searchOpen;
    document.getElementById('nav-search').classList.toggle('open', searchOpen);
    if (searchOpen) document.getElementById('search-input').focus();
    else {
      document.getElementById('search-input').value = '';
      document.getElementById('search-results').classList.remove('open');
    }
  }

  function runSearch(q) {
    const res = document.getElementById('search-results');
    q = q.trim().toLowerCase();
    if (!q) { res.classList.remove('open'); return; }
    const hits = NAV_USERS.filter(u => u.handle.toLowerCase().includes(q));
    res.innerHTML = hits.length
      ? hits.map(u => `
          <a class="search-result" href="/hush/profile.html?u=${encodeURIComponent(u.handle)}">
            <div class="search-result-avatar ${u.avatarClass}"></div>
            <span class="search-result-handle">${u.handle}</span>
          </a>`).join('')
      : `<div class="search-no-results">no one found</div>`;
    res.classList.add('open');
  }

  window.toggleSearch = toggleSearch;
  window.runSearch = runSearch;
</script>
</body>
</html>
