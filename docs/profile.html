<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hush — profile</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:       #FDF6EE;
      --parchment:   #F7EDE2;
      --blush:       #F9C49A;
      --blush-light: #FCDFC4;
      --muted:       rgba(215, 120, 40, 0.25);
      --wine:        #D96B10;
      --wine-light:  #F08030;
      --wine-pale:   rgba(215, 120, 40, 0.15);
      --text:        #221206;
      --text-muted:  #8C5828;
      --link-hover:  #E8829A;
    }

    body {
      background: var(--cream);
      color: var(--text);
      font-family: 'Georgia', serif;
      min-height: 100vh;
    }

    a:hover { color: var(--link-hover) !important; }

    /* ── NAV ─────────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--cream);
      border-bottom: 1px solid var(--blush);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 52px;
    }

    .wordmark {
      font-size: 1.25rem;
      font-style: italic;
      color: var(--wine);
      letter-spacing: 0.04em;
      text-decoration: none;
    }

    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-muted);
      font-family: system-ui;
      font-size: 0.78rem;
      letter-spacing: 0.03em;
      text-decoration: none;
      transition: color 0.15s;
    }

    .back-btn:hover { color: var(--wine); }
    .back-btn svg { width: 14px; height: 14px; fill: currentColor; }

    /* ── PROFILE HEADER ──────────────────────── */
    .profile-wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    .profile-header {
      padding: 2rem 0 1.25rem;
      display: flex;
      align-items: flex-end;
      gap: 1.25rem;
    }

    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .profile-avatar.wine  { background: var(--wine-pale); }
    .profile-avatar.blush { background: var(--blush); }
    .profile-avatar.cream { background: var(--parchment); }

    .profile-info { flex: 1; }

    .profile-handle {
      font-size: 1rem;
      font-family: system-ui;
      font-weight: 700;
      color: var(--text);
    }

    .profile-bio {
      font-size: 0.875rem;
      line-height: 1.6;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }

    .profile-stats {
      display: flex;
      gap: 1.5rem;
      margin-top: 0.75rem;
    }

    .stat {
      font-family: system-ui;
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .stat strong {
      display: block;
      font-size: 0.95rem;
      color: var(--text);
      letter-spacing: 0;
      text-transform: none;
      margin-bottom: 1px;
    }

    .follow-btn {
      background: var(--wine);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 0.45rem 1.2rem;
      font-size: 0.78rem;
      font-family: system-ui;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      align-self: center;
    }

    .follow-btn:hover { background: var(--wine-light); }
    .follow-btn.following {
      background: transparent;
      color: var(--wine);
      border: 1px solid var(--blush);
    }

    /* ── DIVIDER ──────────────────────────────── */
    .profile-divider {
      border: none;
      border-top: 1px solid var(--blush-light);
      margin: 0;
    }

    /* ── POST CARDS (same as feed) ───────────── */
    .feed {
      display: flex;
      flex-direction: column;
      gap: 1px;
      padding-bottom: 4rem;
    }

    .post {
      background: var(--cream);
      border-top: 1px solid var(--blush-light);
      padding: 1.25rem 0 1rem;
    }

    .post:first-child { border-top: none; }

    .post-body {
      font-size: 0.975rem;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
    }

    .post-time {
      font-size: 0.7rem;
      font-family: system-ui;
      color: var(--text-muted);
      margin-bottom: 0.65rem;
    }

    .post-footer {
      margin-top: 0.85rem;
      display: flex;
      align-items: center;
    }

    /* ── DECIBELS (same) ──────────────────────── */
    .decibels {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      cursor: pointer;
      padding: 4px 0;
    }

    .decibels .bar:nth-child(1) { width: 3px; height: 6px;  border-radius: 2px; }
    .decibels .bar:nth-child(2) { width: 3px; height: 10px; border-radius: 2px; }
    .decibels .bar:nth-child(3) { width: 3px; height: 15px; border-radius: 2px; }
    .decibels .bar:nth-child(4) { width: 3px; height: 20px; border-radius: 2px; }

    .decibels .bar            { background: var(--blush-light); transition: background 0.15s; }
    .decibels[data-level="1"] .bar:nth-child(1)       { background: var(--wine); }
    .decibels[data-level="2"] .bar:nth-child(-n+2)    { background: var(--wine); }
    .decibels[data-level="3"] .bar:nth-child(-n+3)    { background: var(--wine); }
    .decibels[data-level="4"] .bar                    { background: var(--wine); }

    .decibels.heard .bar                              { background: #FADADD; }
    .decibels.heard[data-level="1"] .bar:nth-child(1)    { background: #F06090; }
    .decibels.heard[data-level="2"] .bar:nth-child(-n+2) { background: #F06090; }
    .decibels.heard[data-level="3"] .bar:nth-child(-n+3) { background: #F06090; }
    .decibels.heard[data-level="4"] .bar                 { background: #F06090; }

    .decibels:not(.heard):hover .bar { background: #F5C0CC; }

    .read-more {
      display: inline;
      background: none;
      border: none;
      padding: 0;
      margin-left: 0.25em;
      font-family: system-ui;
      font-size: 0.78rem;
      color: var(--wine-light);
      cursor: pointer;
    }

    .read-more:hover { text-decoration: underline; color: var(--link-hover); }

    /* ── NOT FOUND ───────────────────────────── */
    .not-found {
      text-align: center;
      padding: 4rem 1rem;
      font-family: system-ui;
      color: var(--text-muted);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>

<nav>
  <a class="wordmark" href="/hush/">hush</a>
  <a class="back-btn" href="/hush/">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    feed
  </a>
</nav>

<div class="profile-wrap">
  <div id="profile-root"></div>
</div>

<script>
  const USERS = {
    '@margaux': {
      handle: '@margaux',
      avatarClass: 'cream',
      bio: 'Style columnist. Watching the city dress itself every morning.',
      followers: 412,
      following: 88,
      posts: [
        { id: 101, body: "The light in January is thin and honest. It doesn't flatter anything — not the buildings, not the people. But it's the only light that feels true.", time: '4h ago', decibels: 1200, heard: false, ts: Date.now() - 4*3600000 },
        { id: 102, body: "Borrowed a friend's apartment for a week. The hardest part was learning which silence was restful and which was just empty.", time: '1d ago', decibels: 0, heard: false, ts: Date.now() - 26*3600000 },
        { id: 103, body: "A coat is the last thing you put on before the world sees you and the first thing it sees. People underestimate the coat.", time: '2d ago', decibels: 47, heard: false, ts: Date.now() - 50*3600000 },
      ]
    },
    '@roxy': {
      handle: '@roxy',
      avatarClass: 'wine',
      bio: 'Nightlife columnist. I write about the hours you don\'t remember.',
      followers: 739,
      following: 204,
      posts: [
        { id: 201, body: "Every club has a Tuesday night when it reveals its real self. No dress code, no hype, just whoever actually loves the music. That's the night you want.", time: '7h ago', decibels: 84, heard: false, ts: Date.now() - 7*3600000 },
        { id: 202, body: "The DJ who plays to an empty floor at 1am and doesn't change a single thing — that's commitment. Or delusion. The line is thin and honestly that's the appeal.", time: '2d ago', decibels: 210, heard: false, ts: Date.now() - 52*3600000 },
      ]
    },
    '@tina': {
      handle: '@tina',
      avatarClass: 'blush',
      bio: 'Gossip columnist. Everything I write is true, especially the parts that aren\'t.',
      followers: 1840,
      following: 312,
      posts: [
        { id: 301, body: "She wore the same earrings to three events in a row and somehow each time they meant something different. That's not a wardrobe. That's a language.", time: '9h ago', decibels: 7, heard: true, ts: Date.now() - 9*3600000 },
        { id: 302, body: "There is one person in every city who knows everything and tells you just enough to make you desperate for more. Find them. Befriend them. Never cross them.", time: '3d ago', decibels: 980, heard: false, ts: Date.now() - 72*3600000 },
      ]
    },
    '@celeste': {
      handle: '@celeste',
      avatarClass: 'cream',
      bio: 'Dining critic. I eat for a living and I take it personally.',
      followers: 603,
      following: 141,
      posts: [
        { id: 401, body: "A restaurant that serves only one thing perfectly is making a statement about patience. You either believe in it or you don't.", time: '11h ago', decibels: 430, heard: false, ts: Date.now() - 11*3600000 },
        { id: 402, body: "There's a particular kind of restaurant that exists only in the imagination of people who've never had to run one. Everything is sourced locally, the menu changes daily, the staff are paid fairly, the space is beautiful, and somehow it's also affordable. People describe this place like it's obvious. Like the math just works if you care enough. I've eaten at enough places to know the math never works. Something always gives. Usually it's the staff. Sometimes it's the sourcing. Occasionally it's the owner's savings. The restaurants I trust most are the ones that've clearly made a choice about what they're willing to compromise on — and own it.", time: '2d ago', decibels: 4, heard: false, ts: Date.now() - 48*3600000 },
      ]
    }
  };

  const params = new URLSearchParams(location.search);
  const handle = decodeURIComponent(params.get('u') || '');
  const user = USERS[handle];
  const root = document.getElementById('profile-root');

  if (!user) {
    root.innerHTML = `<div class="not-found">no one here by that name</div>`;
  } else {
    document.title = `hush — ${user.handle}`;

    let following = false;

    function dbLevel(n) {
      if (n === 0) return 0;
      if (n < 10)  return 1;
      if (n < 100) return 2;
      if (n < 1000)return 3;
      return 4;
    }

    function renderProfile() {
      const FOLD = 333;
      const postsHtml = user.posts.map(p => {
        const folded = p.body.length > FOLD && !p.expanded;
        const body = folded ? p.body.slice(0, FOLD).trimEnd() : p.body;
        const more = folded ? `<button class="read-more" onclick="expandPost(${p.id})">… read more</button>` : '';
        return `
        <div class="post">
          <div class="post-time">${p.time}</div>
          <div class="post-body">${body}${more}</div>
          <div class="post-footer">
            <div class="decibels ${p.heard ? 'heard' : ''}" data-level="${dbLevel(p.decibels)}" onclick="toggleHeard(${p.id})">
              <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
          </div>
        </div>`;
      }).join('');

      root.innerHTML = `
        <div class="profile-header">
          <div class="profile-avatar ${user.avatarClass}"></div>
          <div class="profile-info">
            <div class="profile-handle">${user.handle}</div>
            <div class="profile-bio">${user.bio}</div>
            <div class="profile-stats">
              <div class="stat"><strong>${user.posts.length}</strong>posts</div>
              <div class="stat"><strong>${user.followers.toLocaleString()}</strong>followers</div>
              <div class="stat"><strong>${user.following}</strong>following</div>
            </div>
          </div>
          <button class="follow-btn ${following ? 'following' : ''}" onclick="toggleFollow()">${following ? 'following' : 'follow'}</button>
        </div>
        <hr class="profile-divider">
        <div class="feed">${postsHtml}</div>
      `;
    }

    function toggleFollow() {
      following = !following;
      renderProfile();
    }

    function expandPost(id) {
      const p = user.posts.find(x => x.id === id);
      if (p) { p.expanded = true; renderProfile(); }
    }

    function toggleHeard(id) {
      const p = user.posts.find(x => x.id === id);
      if (!p) return;
      p.heard = !p.heard;
      p.decibels += p.heard ? 1 : -1;
      renderProfile();
    }

    // expose to inline onclick
    window.toggleFollow = toggleFollow;
    window.expandPost = expandPost;
    window.toggleHeard = toggleHeard;

    renderProfile();
  }
</script>
</body>
</html>
